name: Build verified Japanese recipes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/build-japanese-recipes.mjs'
      - '.github/workflows/build-japanese-recipes.yml'

permissions:
  contents: write

concurrency:
  group: build-japanese-recipes
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check scripts
        run: |
          node --check scripts/build-japanese-recipes.mjs
          node --check app.js
          node --check sw.js

      - name: Crawl current official recipe pages
        run: node scripts/build-japanese-recipes.mjs

      - name: Validate 500 current-page recipes
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const recipes = JSON.parse(fs.readFileSync('recipes.json', 'utf8'));
          const report = JSON.parse(fs.readFileSync('recipes-validation.json', 'utf8'));
          if (!Array.isArray(recipes) || recipes.length !== 500) throw new Error(`recipes.json: ${recipes.length}件`);
          if (new Set(recipes.map(r => r.sourceUrl.replace(/\/$/, ''))).size !== 500) throw new Error('出典URLに重複があります');
          if (new Set(recipes.map(r => r.name.replace(/\s/g, ''))).size !== 500) throw new Error('料理名に重複があります');
          if (recipes.some(r => !r.name || !Array.isArray(r.ingredients) || r.ingredients.length < 3 || !Array.isArray(r.steps) || !r.steps.length || !r.sourceUrl || r.dataOrigin !== '現在の公開ページ')) {
            throw new Error('現在ページ由来の必須項目が不足しています');
          }
          if (report.outputCount !== 500 || report.archivedRecipeContentUsed !== false) throw new Error('検証報告が不正です');
          console.log('500件の検証に合格しました');
          NODE

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recipes.json recipes-validation.json recipes-crawl-progress.json
          git commit -m "Add 500 verified current Japanese recipes" || exit 0
          git push

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: recipe-crawl-diagnostics
          path: |
            recipes-crawl-progress.json
            recipes-validation-partial.json
          if-no-files-found: ignore
