<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>キャッシュを初期化しています</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3efe7;color:#25231f;padding:32px}
    main{max-width:620px;margin:auto;background:#fffdf9;border:1px solid #e5dccf;border-radius:20px;padding:24px}
  </style>
</head>
<body>
<main>
  <h1>古いデータを消しています</h1>
  <p id="message">少しお待ちください。</p>
</main>
<script>
(async () => {
  try {
    if ("serviceWorker" in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(registration => registration.unregister()));
    }
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(key => caches.delete(key)));
    }
    document.getElementById("message").textContent = "完了しました。アプリへ移動します。";
    setTimeout(() => location.replace("./?reset=" + Date.now()), 700);
  } catch (error) {
    document.getElementById("message").textContent =
      "自動削除に失敗しました。ブラウザを閉じてから、もう一度このページを開いてください。";
  }
})();
</script>
</body>
</html>
